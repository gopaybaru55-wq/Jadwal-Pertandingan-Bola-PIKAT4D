<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prediksi Bola PIKAT4D</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top-text">PREDIKSI OTOMATIS</div>
    <h1>JADWAL DAN PREDIKSI BOLA</h1>
    <p class="subtitle">Update Harian • Prediksi Skor • Analisa Otomatis</p>

    <div class="controls">
      <button id="refreshBtn">🔄 Refresh Prediksi</button>
      <span id="lastUpdate">Update: -</span>
    </div>

    <div class="table-wrapper">
      <table id="jadwal-table">
        <thead>
          <tr>
            <th>Jam</th>
            <th>Pertandingan</th>
            <th>Liga</th>
            <th>Status</th>
            <th>Prediksi Skor</th>
            <th>Win Rate</th>
          </tr>
        </thead>
        <tbody id="matchBody"></tbody>
      </table>
    </div>

    <div class="legend">
      <div><span class="dot live"></span> Sedang Main</div>
      <div><span class="dot soon"></span> Akan Main</div>
      <div><span class="dot finished"></span> Selesai</div>
    </div>

    <footer>
      <p>© 2026 PIKAT4D • Jadwal & Prediksi Bola</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
